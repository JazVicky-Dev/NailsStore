version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nailmuse_postgres
    environment:
      POSTGRES_DB: nailmuse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nailmuse_pgdata:/var/lib/postgresql/data

volumes:
  nailmuse_pgdata: